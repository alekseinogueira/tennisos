# Supabase project config. Pins per-function settings so deploys don't rely on
# CLI defaults. Project ref mirrors supabase/.temp/linked-project.json.
project_id = "vdyvlylacsghnvtllrzj"

# Invite email sender. Triggered from the coach's authenticated browser session
# (StudentForm create flow), which sends a valid JWT (anon key), so keep JWT
# verification ON — it blocks anonymous spam of the email endpoint at the gateway.
[functions.send-invite-email]
verify_jwt = true

# Feedback "your analysis is ready" email. Triggered server-to-server by the n8n
# "55TC - Publicar Feedback" workflow (ETAPA 4), which has no Supabase user JWT —
# so JWT verification is OFF at the gateway. The function guards itself via
# _shared/coach-auth.ts: service-role key (n8n) OR a coach/admin user JWT
# (Fase F2 — the portal emails the student when the coach publishes manually).
[functions.send-feedback-email]
verify_jwt = false

# Fase F2 — Claude drafts the "Análise do Coach" for the manual feedback path.
# Called from the coach's browser session; the gateway JWT check would accept ANY
# signed-in student, so it's OFF and the function enforces role coach/admin itself
# (same _shared/coach-auth.ts guard). Secret: ANTHROPIC_API_KEY.
[functions.generate-feedback-analysis]
verify_jwt = false
